# ============================================
# Xnix 系统服务配置
# ============================================

# --- 权限 Profile 定义 ---

[profile.driver]
xnix.ipc.* = true
xnix.handle.grant = true
xnix.mm.mmap = true
xnix.debug.console = true

[profile.io_driver]
inherit = driver
xnix.io.port.* = true
xnix.irq.all = true
xnix.debug.console = true

[profile.default]
xnix.ipc.send = true
xnix.ipc.recv = true
xnix.process.exec = true
xnix.ipc.endpoint.* = true
xnix.mm.mmap = true
xnix.debug.console = true

[profile.sudo]
xnix.* = true

# --- 服务发现定义 ---

[handle.ramfs_ep]
type = endpoint

[handle.serial]
type = endpoint

[handle.kbd_ep]
type = endpoint

[handle.tty0]
type = endpoint

[handle.tty1]
type = endpoint

[handle.vfs_ep]
type = endpoint

[handle.fatfs_ep]
type = endpoint

[handle.fb_mem]
type = inherit

[handle.vga_mem]
type = inherit

[handle.vga_ep]
type = endpoint

[handle.fbcon_ep]
type = endpoint

[handle.boot.system]
type = inherit

[handle.fatfs_ata_ep]
type = endpoint

[handle.fatfs_ata1_ep]
type = endpoint

[handle.devfs_ep]
type = endpoint

[handle.sudo_ep]
type = endpoint

# --- 核心服务 (ramfs 加载) ---

[service.seriald]
path = ramfs:///sbin/seriald.elf
profile = io_driver

# 服务发现
provides = serial
wants = tty1

# 权限（IRQ 4 + 串口端口）
xnix.irq.4 = true
xnix.io.port.0x3f8-0x3ff = true

[service.kbd]
path = ramfs:///sbin/kbd.elf
profile = io_driver
after = seriald
handles = kbd_ep

# IRQ1 (键盘) + PS/2 端口
xnix.irq.1 = true
xnix.io.port.0x60-0x64 = true

[handle.mouse_ep]
type = endpoint

[service.moused]
path = ramfs:///sbin/moused.elf
profile = io_driver
after = seriald kbd
handles = mouse_ep

# IRQ12 (PS/2 鼠标) + PS/2 端口
xnix.irq.12 = true
xnix.io.port.0x60-0x64 = true

# --- VFS 服务 ---

[service.vfsserver]
path = ramfs:///sbin/vfsserver.elf
profile = driver
after = seriald
provides = vfs_ep
handles = serial

# VFS需要grant权限来转发handles
xnix.handle.grant = true

[service.fatfsd]
path = ramfs:///sbin/fatfsd.elf
profile = io_driver
after = seriald vfsserver
ready = vfsserver
provides = fatfs_ep
handles = serial boot.system
mount = /

[service.fatfsd_ata]
path = /sbin/fatfsd.elf
args = --ata
profile = io_driver
after = seriald vfsserver fatfsd
ready = vfsserver fatfsd
provides = fatfs_ata_ep
handles = serial devfs_ep
mount = /mnt/sda1

# ATA I/O 端口 (Primary ATA)
xnix.irq.14 = true
xnix.io.port.0x1F0-0x1F7 = true
xnix.io.port.0x3F6 = true

[service.fatfsd_ata1]
path = /sbin/fatfsd.elf
args = --ata --drive 1
profile = io_driver
after = seriald vfsserver fatfsd
ready = vfsserver fatfsd
provides = fatfs_ata1_ep
handles = serial devfs_ep
mount = /mnt/sdb1

# ATA I/O 端口 (Primary ATA，与 fatfsd_ata 共享控制器)
xnix.irq.14 = true
xnix.io.port.0x1F0-0x1F7 = true
xnix.io.port.0x3F6 = true

[service.devfsd]
path = ramfs:///sbin/devfsd.elf
profile = driver
after = seriald vfsserver fatfsd
ready = vfsserver fatfsd
provides = devfs_ep
handles = serial
mount = /dev

[service.vgad]
path = ramfs:///sbin/vgad.elf
profile = io_driver
after = seriald
provides = vga_ep
handles = vga_mem serial

# VGA I/O ports (cursor control)
xnix.io.port.0x3d4-0x3d5 = true

[service.fbd]
path = ramfs:///sbin/fbd.elf
profile = driver
after = seriald
provides = fb_ep
handles = fb_mem serial

[service.fbcond]
path = ramfs:///sbin/fbcond.elf
profile = driver
after = seriald
provides = fbcon_ep
handles = fb_mem serial

[service.ttyd]
path = ramfs:///sbin/ttyd.elf
profile = driver
after = seriald kbd vgad fbd fbcond
provides = tty0 tty1
wants = vga_ep fb_ep fbcon_ep
handles = serial kbd_ep

[service.klogd]
path = ramfs:///sbin/klogd.elf
profile = driver
after = ttyd
ready = ttyd
wants = tty1
xnix.kernel.kmsg = true

# --- 用户服务 (VFS 加载) ---

[service.shell]
path = /bin/shell.elf
profile = default
after = seriald kbd vgad vfsserver fatfsd ttyd klogd
ready = ttyd fatfsd
requires = kbd_ep vfs_ep tty0
wants = sudo_ep
respawn = true

[service.shell_serial]
path = /bin/shell.elf
args = --tty=tty1 --svc=shell_serial
profile = default
after = seriald vfsserver fatfsd ttyd klogd
ready = ttyd fatfsd
requires = vfs_ep tty1
wants = sudo_ep
respawn = true

[service.sudod]
path = /bin/sudod.elf
profile = sudo
after = vfsserver fatfsd ttyd
ready = fatfsd
provides = sudo_ep
handles = serial vfs_ep
respawn = true
