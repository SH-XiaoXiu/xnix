# ============================================
# Xnix 系统服务配置
# ============================================

# --- 服务发现定义 ---

[handle.ramfs_ep]
type = endpoint

[handle.serial]
type = endpoint

[handle.serial_in]
type = endpoint

[handle.com1]
type = endpoint

[handle.com_in1]
type = endpoint

[handle.com2]
type = endpoint

[handle.com_in2]
type = endpoint

[handle.com3]
type = endpoint

[handle.com_in3]
type = endpoint

[handle.kbd_ep]
type = endpoint

[handle.tty0]
type = endpoint

[handle.tty1]
type = endpoint

[handle.tty2]
type = endpoint

[handle.tty3]
type = endpoint

[handle.tty4]
type = endpoint

[handle.tty5]
type = endpoint

[handle.tty6]
type = endpoint

[handle.vfs_ep]
type = endpoint

[handle.fatfs_ep]
type = endpoint

[handle.fb_mem]
type = inherit

[handle.vga_mem]
type = inherit

[handle.vga_ep]
type = endpoint

[handle.fbcon_ep]
type = endpoint

[handle.console_ep]
type = endpoint

[handle.boot.system]
type = inherit

[handle.fatfs_ata_ep]
type = endpoint

[handle.fatfs_ata1_ep]
type = endpoint

[handle.devfs_ep]
type = endpoint

[handle.sudo_ep]
type = endpoint

[handle.ws_ep]
type = endpoint

[handle.syslog_ep]
type = endpoint

[handle.mouse_ep]
type = endpoint

# --- 核心服务 (ramfs 加载) ---

[service.serial]
path = ramfs:///sbin/driver/serial.elf
provides = serial serial_in com1 com_in1 com2 com_in2 com3 com_in3

[service.syslog]
path = ramfs:///sbin/syslog.elf
after = serial
provides = syslog_ep

[service.ps2]
path = ramfs:///sbin/driver/ps2.elf
after = serial
handles = kbd_ep mouse_ep

[service.vfs]
path = ramfs:///sbin/vfs.elf
after = serial
provides = vfs_ep
handles = serial

[service.fatfs]
path = ramfs:///sbin/driver/fatfs.elf
after = serial vfs
ready = vfs
provides = fatfs_ep
handles = serial boot.system
mount = /

[service.fatfs_ata]
path = /sbin/driver/fatfs.elf
args = --ata
after = serial vfs fatfs
ready = vfs fatfs
provides = fatfs_ata_ep
handles = serial devfs_ep
mount = /mnt/sda1

[service.fatfs_ata1]
path = /sbin/driver/fatfs.elf
args = --ata --drive 1
after = serial vfs fatfs
ready = vfs fatfs
provides = fatfs_ata1_ep
handles = serial devfs_ep
mount = /mnt/sdb1

[service.devfs]
path = ramfs:///sbin/devfs.elf
after = serial vfs fatfs
ready = vfs fatfs
provides = devfs_ep
handles = serial
mount = /dev

[service.ws]
path = ramfs:///sbin/ws.elf
after = serial ps2 display console
ready = console
provides = ws_ep
handles = fb_mem serial kbd_ep mouse_ep ws_ep

[service.display]
path = ramfs:///sbin/driver/display.elf
args = --mode=fb
after = serial
provides = fbcon_ep
handles = fb_mem

[service.term]
path = ramfs:///sbin/term.elf
after = serial ps2 display devfs
provides = tty0 tty1 tty2 tty3 tty4 tty5 tty6
wants = devfs_ep
handles = serial serial_in com1 com_in1 com2 com_in2 com3 com_in3 kbd_ep fbcon_ep

[service.console]
path = ramfs:///sbin/console.elf
after = term
ready = term
provides = console_ep
handles = tty0 tty5 tty6 ws_ep

[service.klog]
path = ramfs:///sbin/klog.elf
after = term
ready = term
wants = tty1

# --- 用户服务 (VFS 加载) ---

[service.shell]
path = /bin/shell.elf
args = --tty=tty0 --svc=shell
after = serial vfs fatfs term console
ready = term console fatfs
requires = vfs_ep tty0
wants = sudo_ep console_ep ws_ep
stdio = tty0
respawn = true

[service.shell_serial]
path = /bin/shell.elf
args = --tty=tty1 --svc=shell_serial
after = serial vfs fatfs term console klog
ready = term console fatfs
requires = vfs_ep tty1
wants = sudo_ep console_ep ws_ep
stdio = tty1
respawn = true

[service.shell_serial2]
path = /bin/shell.elf
args = --tty=tty2 --svc=shell_serial2
after = serial vfs fatfs term console
ready = term console fatfs
requires = vfs_ep tty2
wants = sudo_ep console_ep ws_ep
stdio = tty2
respawn = true

[service.shell_serial3]
path = /bin/shell.elf
args = --tty=tty3 --svc=shell_serial3
after = serial vfs fatfs term console
ready = term console fatfs
requires = vfs_ep tty3
wants = sudo_ep console_ep ws_ep
stdio = tty3
respawn = true

[service.shell_serial4]
path = /bin/shell.elf
args = --tty=tty4 --svc=shell_serial4
after = serial vfs fatfs term console
ready = term console fatfs
requires = vfs_ep tty4
wants = sudo_ep console_ep ws_ep
stdio = tty4
respawn = true

[service.shell_vt5]
path = /bin/shell.elf
args = --tty=tty5 --svc=shell_vt5
after = serial vfs fatfs term console
ready = term console fatfs
requires = vfs_ep tty5
wants = sudo_ep console_ep ws_ep
stdio = tty5
respawn = true

[service.shell_vt6]
path = /bin/shell.elf
args = --tty=tty6 --svc=shell_vt6
after = serial vfs fatfs term console
ready = term console fatfs
requires = vfs_ep tty6
wants = sudo_ep console_ep ws_ep
stdio = tty6
respawn = true

[service.sudod]
path = /bin/sudod.elf
after = vfs fatfs term
ready = fatfs
provides = sudo_ep
handles = serial vfs_ep
respawn = true
