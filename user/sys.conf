# ============================================
# Xnix 系统服务配置
# ============================================

# --- 服务发现定义 ---

[handle.ramfs_ep]
type = endpoint

[handle.serial]
type = endpoint

[handle.serial_in]
type = endpoint

[handle.com1]
type = endpoint

[handle.com_in1]
type = endpoint

[handle.com2]
type = endpoint

[handle.com_in2]
type = endpoint

[handle.com3]
type = endpoint

[handle.com_in3]
type = endpoint

[handle.kbd_ep]
type = endpoint

[handle.tty0]
type = endpoint

[handle.tty1]
type = endpoint

[handle.tty2]
type = endpoint

[handle.tty3]
type = endpoint

[handle.tty4]
type = endpoint

[handle.tty5]
type = endpoint

[handle.tty6]
type = endpoint

[handle.vfs_ep]
type = endpoint

[handle.fatfs_ep]
type = endpoint

[handle.fb_mem]
type = inherit

[handle.vga_mem]
type = inherit

[handle.vga_ep]
type = endpoint

[handle.fbcon_ep]
type = endpoint

[handle.console_ep]
type = endpoint

[handle.boot.system]
type = inherit

[handle.fatfs_ata_ep]
type = endpoint

[handle.fatfs_ata1_ep]
type = endpoint

[handle.devfs_ep]
type = endpoint

[handle.sudo_ep]
type = endpoint

[handle.ws_ep]
type = endpoint

[handle.syslog_ep]
type = endpoint

[handle.mouse_ep]
type = endpoint

# --- 核心服务 (ramfs 加载) ---

[service.seriald]
path = ramfs:///sbin/seriald.elf
provides = serial serial_in com1 com_in1 com2 com_in2 com3 com_in3

[service.syslogd]
path = ramfs:///sbin/syslogd.elf
after = seriald
provides = syslog_ep

[service.ps2d]
path = ramfs:///sbin/ps2d.elf
after = seriald
handles = kbd_ep mouse_ep

[service.vfsserver]
path = ramfs:///sbin/vfsserver.elf
after = seriald
provides = vfs_ep
handles = serial

[service.fatfsd]
path = ramfs:///sbin/fatfsd.elf
after = seriald vfsserver
ready = vfsserver
provides = fatfs_ep
handles = serial boot.system
mount = /

[service.fatfsd_ata]
path = /sbin/fatfsd.elf
args = --ata
after = seriald vfsserver fatfsd
ready = vfsserver fatfsd
provides = fatfs_ata_ep
handles = serial devfs_ep
mount = /mnt/sda1

[service.fatfsd_ata1]
path = /sbin/fatfsd.elf
args = --ata --drive 1
after = seriald vfsserver fatfsd
ready = vfsserver fatfsd
provides = fatfs_ata1_ep
handles = serial devfs_ep
mount = /mnt/sdb1

[service.devfsd]
path = ramfs:///sbin/devfsd.elf
after = seriald vfsserver fatfsd
ready = vfsserver fatfsd
provides = devfs_ep
handles = serial
mount = /dev

# [service.wsd]
# VGA shell 验证阶段暂时停用:
# wsd 和 termd 都会消费 kbd_ep, 会导致 tty0 输入被抢.
# 待 VGA shell 跑通后, 再引入键盘事件分发/复用机制恢复.
# path = ramfs:///sbin/wsd.elf
# after = seriald ps2d
# provides = ws_ep
# handles = fb_mem serial kbd_ep mouse_ep ws_ep

[service.displayd]
path = ramfs:///sbin/displayd.elf
args = --mode=fb
after = seriald
provides = fbcon_ep
handles = fb_mem

[service.termd]
path = ramfs:///sbin/termd.elf
after = seriald ps2d displayd devfsd
provides = tty0 tty1 tty2 tty3 tty4 tty5 tty6
wants = devfs_ep
handles = serial serial_in com1 com_in1 com2 com_in2 com3 com_in3 kbd_ep fbcon_ep

[service.consoled]
path = ramfs:///sbin/consoled.elf
after = termd
ready = termd
provides = console_ep
handles = tty0 tty5 tty6

[service.klogd]
path = ramfs:///sbin/klogd.elf
after = termd
ready = termd
wants = tty1

# --- 用户服务 (VFS 加载) ---

[service.shell]
path = /bin/shell.elf
args = --tty=tty0 --svc=shell
after = seriald vfsserver fatfsd termd consoled
ready = termd consoled fatfsd
requires = vfs_ep tty0
wants = sudo_ep console_ep
stdio = tty0
respawn = true

[service.shell_serial]
path = /bin/shell.elf
args = --tty=tty1 --svc=shell_serial
after = seriald vfsserver fatfsd termd consoled klogd
ready = termd consoled fatfsd
requires = vfs_ep tty1
wants = sudo_ep console_ep
stdio = tty1
respawn = true

[service.shell_serial2]
path = /bin/shell.elf
args = --tty=tty2 --svc=shell_serial2
after = seriald vfsserver fatfsd termd consoled
ready = termd consoled fatfsd
requires = vfs_ep tty2
wants = sudo_ep console_ep
stdio = tty2
respawn = true

[service.shell_serial3]
path = /bin/shell.elf
args = --tty=tty3 --svc=shell_serial3
after = seriald vfsserver fatfsd termd consoled
ready = termd consoled fatfsd
requires = vfs_ep tty3
wants = sudo_ep console_ep
stdio = tty3
respawn = true

[service.shell_serial4]
path = /bin/shell.elf
args = --tty=tty4 --svc=shell_serial4
after = seriald vfsserver fatfsd termd consoled
ready = termd consoled fatfsd
requires = vfs_ep tty4
wants = sudo_ep console_ep
stdio = tty4
respawn = true

[service.shell_vt5]
path = /bin/shell.elf
args = --tty=tty5 --svc=shell_vt5
after = seriald vfsserver fatfsd termd consoled
ready = termd consoled fatfsd
requires = vfs_ep tty5
wants = sudo_ep console_ep
stdio = tty5
respawn = true

[service.shell_vt6]
path = /bin/shell.elf
args = --tty=tty6 --svc=shell_vt6
after = seriald vfsserver fatfsd termd consoled
ready = termd consoled fatfsd
requires = vfs_ep tty6
wants = sudo_ep console_ep
stdio = tty6
respawn = true

[service.sudod]
path = /bin/sudod.elf
after = vfsserver fatfsd termd
ready = fatfsd
provides = sudo_ep
handles = serial vfs_ep
respawn = true
